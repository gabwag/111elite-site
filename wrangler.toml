name = "111elite-site"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./dist"

# D1 and KV bindings are commented out until the CF API token has Account-level permissions.
# To add: create a new CF token with Workers KV + D1 read/write permissions, then:
#   wrangler d1 create 111elite-bookings
#   wrangler kv:namespace create RATE_LIMIT_KV
# Uncomment and fill IDs below, then redeploy.

# [[d1_databases]]
# binding = "DB"
# database_name = "111elite-bookings"
# database_id = "FILL_AFTER_D1_CREATE"

# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "FILL_AFTER_KV_CREATE"

# Non-secret env vars — baked into every deployment via wrangler.
[vars]
FROM_EMAIL = "bookings@send.111elitecarservice.com"
ALEX_EMAIL = "hello@111elitecarservice.com"
# CC address — until Google Workspace mailbox at hello@ is live, keep Proton so tests are received.
# Also: second notification email (to be filled when user provides it) goes here.
ALEX_EMAIL_CC = "aiwithgabe@proton.me"
ALEX_PHONE = ""

# Secrets stay in the CF Pages dashboard (set via REST API or UI):
#   RESEND_API_KEY — client's Resend API key (already configured)
